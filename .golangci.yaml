run:
  # timeout for analysis, e.g. 30s, 5m, default is 1m
  timeout: 10m
  tests: true

linters:
  disable-all: true
  enable:
    - bodyclose
    - dogsled
    - errcheck
    - goconst
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unused
    - unparam

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
    - gofmt
    - gci

version: 2
issues:
  max-issues-per-linter: 0
